name: 🚀 Deploy Flask API to Cloud Run

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    env:
      SERVICE_NAME: wizcoco-api
      REGION: asia-northeast3
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 🔧 Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: 🐳 Build and push image
        run: |
          if [ -z "${PROJECT_ID}" ]; then
            echo "❌ GCP_PROJECT_ID secret가 설정되어 있지 않습니다."
            exit 1
          fi
          IMAGE="gcr.io/${PROJECT_ID}/${SERVICE_NAME}:${GITHUB_SHA}"
          gcloud builds submit ./backend \
            --project "${PROJECT_ID}" \
            --config=backend/cloudbuild.yaml \
            --substitutions=_IMAGE_TAG="${GITHUB_SHA}",_SERVICE_NAME="${SERVICE_NAME}"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      # PERMISSION_DENIED: artifactregistry.repositories.downloadArtifacts → 서비스 계정에 roles/artifactregistry.reader 부여 (backend/README.md 참고)
      - name: 🚀 Deploy to Cloud Run
        run: |
          if [ -z "${PROJECT_ID}" ]; then
            echo "❌ GCP_PROJECT_ID secret가 설정되어 있지 않습니다."
            exit 1
          fi
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image "$IMAGE" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 5000 \
            --project "${PROJECT_ID}"

      - name: 🔗 Output service URL
        run: |
          if [ -z "${PROJECT_ID}" ]; then
            echo "❌ GCP_PROJECT_ID secret가 설정되어 있지 않습니다."
            exit 1
          fi
          URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" --region "${{ env.REGION }}" --project "${PROJECT_ID}" --format 'value(status.url)')
          echo "Cloud Run URL: $URL"
          echo "CLOUD_RUN_URL=$URL" >> $GITHUB_ENV

      - name: 🧹 Clean up old container images (keep latest 5)
        run: |
          if [ -z "${PROJECT_ID}" ]; then
            echo "⚠️ PROJECT_ID 없음, 이미지 정리 건너뜀"
            exit 0
          fi

          REPO="gcr.io/${PROJECT_ID}/${SERVICE_NAME}"

          echo "📋 현재 이미지 목록 조회: $REPO"
          # digest 기준으로 오래된 것부터 정렬, 최근 5개 제외하고 삭제
          DIGESTS=$(gcloud container images list-tags "$REPO" \
            --project "${PROJECT_ID}" \
            --sort-by="~TIMESTAMP" \
            --format="get(digest)" \
            2>/dev/null | tail -n +6)

          if [ -z "$DIGESTS" ]; then
            echo "✅ 삭제할 이미지 없음 (5개 이하 보관 중)"
            exit 0
          fi

          echo "$DIGESTS" | while read -r DIGEST; do
            if [ -n "$DIGEST" ]; then
              echo "🗑️  삭제: ${REPO}@${DIGEST}"
              gcloud container images delete "${REPO}@${DIGEST}" \
                --project "${PROJECT_ID}" \
                --force-delete-tags \
                --quiet || echo "⚠️ 삭제 실패 (권한 또는 이미 삭제됨): ${DIGEST}"
            fi
          done

          echo "✅ 이미지 정리 완료 (최근 5개 보존)"

