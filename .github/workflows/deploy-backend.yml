name: 🚀 Deploy Flask API to Cloud Run

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

# 연속 push 시 이전 실행 취소 → Cloud Build 분 낭비 방지
concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    env:
      SERVICE_NAME: wizcoco-api
      REGION: asia-northeast3
      AR_REPO: wizcoco-repo
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 🔧 Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: 🗄️ Verify Artifact Registry repository exists (Seoul)
        run: |
          if [ -z "${PROJECT_ID}" ]; then
            echo "❌ GCP_PROJECT_ID secret가 설정되어 있지 않습니다."
            exit 1
          fi
          if ! gcloud artifacts repositories describe "${AR_REPO}" \
            --location="${REGION}" \
            --project="${PROJECT_ID}" \
            --format="value(name)" >/dev/null 2>&1; then
            echo "❌ Artifact Registry 저장소를 찾을 수 없습니다: ${AR_REPO} (${REGION})"
            echo "   먼저 GCP에서 저장소를 1회 생성해 주세요."
            echo "   예시: gcloud artifacts repositories create ${AR_REPO} --repository-format=docker --location=${REGION} --project=${PROJECT_ID}"
            exit 1
          fi
          echo "✅ Artifact Registry 저장소 확인 완료: ${AR_REPO} (${REGION})"

      - name: 🐳 Build and push image (Asia-Northeast3)
        run: |
          if [ -z "${PROJECT_ID}" ]; then
            echo "❌ GCP_PROJECT_ID secret가 설정되어 있지 않습니다."
            exit 1
          fi
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${SERVICE_NAME}:${GITHUB_SHA}"
          gcloud builds submit ./backend \
            --project "${PROJECT_ID}" \
            --config=backend/cloudbuild.yaml \
            --substitutions=_IMAGE_TAG="${GITHUB_SHA}",_SERVICE_NAME="${SERVICE_NAME}",_REGION="${REGION}",_AR_REPO="${AR_REPO}"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      # PERMISSION_DENIED: artifactregistry.repositories.downloadArtifacts → 서비스 계정에 roles/artifactregistry.reader 부여 (backend/README.md 참고)
      - name: 🚀 Deploy to Cloud Run
        run: |
          if [ -z "${PROJECT_ID}" ]; then
            echo "❌ GCP_PROJECT_ID secret가 설정되어 있지 않습니다."
            exit 1
          fi
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image "$IMAGE" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 5000 \
            --min-instances=0 \
            --max-instances=3 \
            --memory=512Mi \
            --cpu=1 \
            --concurrency=80 \
            --cpu-throttling \
            --project "${PROJECT_ID}"

      - name: 🔗 Output service URL
        run: |
          if [ -z "${PROJECT_ID}" ]; then
            echo "❌ GCP_PROJECT_ID secret가 설정되어 있지 않습니다."
            exit 1
          fi
          URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" --region "${{ env.REGION }}" --project "${PROJECT_ID}" --format 'value(status.url)')
          echo "Cloud Run URL: $URL"
          echo "CLOUD_RUN_URL=$URL" >> $GITHUB_ENV

      - name: 🧹 Clean up old container images (keep latest 5)
        run: |
          if [ -z "${PROJECT_ID}" ]; then
            echo "⚠️ PROJECT_ID 없음, 이미지 정리 건너뜀"
            exit 0
          fi

          REPO="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${SERVICE_NAME}"

          echo "📋 현재 이미지 목록 조회: $REPO"
          # digest 기준으로 오래된 것부터 정렬, 최근 5개 제외하고 삭제
          DIGESTS=$(gcloud artifacts docker images list "$REPO" \
            --project "${PROJECT_ID}" \
            --sort-by="~UPDATE_TIME" \
            --format="get(digest)" \
            2>/dev/null | tail -n +6)

          if [ -z "$DIGESTS" ]; then
            echo "✅ 삭제할 이미지 없음 (5개 이하 보관 중)"
            exit 0
          fi

          echo "$DIGESTS" | while read -r DIGEST; do
            if [ -n "$DIGEST" ]; then
              echo "🗑️  삭제: ${REPO}@${DIGEST}"
              gcloud artifacts docker images delete "${REPO}@${DIGEST}" \
                --project "${PROJECT_ID}" \
                --delete-tags \
                --quiet || echo "⚠️ 삭제 실패 (권한 또는 이미 삭제됨): ${DIGEST}"
            fi
          done

          echo "✅ 이미지 정리 완료 (최근 5개 보존)"
