name: 🚀 Deploy Flask API to Cloud Run

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    env:
      SERVICE_NAME: wizcoco-api
      REGION: asia-northeast3
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 🔧 Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: 🐳 Build and push image
        run: |
          if [ -z "${PROJECT_ID}" ]; then
            echo "❌ GCP_PROJECT_ID secret가 설정되어 있지 않습니다."
            exit 1
          fi
          IMAGE="gcr.io/${PROJECT_ID}/${SERVICE_NAME}:${GITHUB_SHA}"
          gcloud builds submit --project "${PROJECT_ID}" --tag "$IMAGE" ./backend
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: 🚀 Deploy to Cloud Run
        run: |
          if [ -z "${PROJECT_ID}" ]; then
            echo "❌ GCP_PROJECT_ID secret가 설정되어 있지 않습니다."
            exit 1
          fi
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image "$IMAGE" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 5000 \
            --project "${PROJECT_ID}"

      - name: 🔗 Output service URL
        run: |
          if [ -z "${PROJECT_ID}" ]; then
            echo "❌ GCP_PROJECT_ID secret가 설정되어 있지 않습니다."
            exit 1
          fi
          URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" --region "${{ env.REGION }}" --project "${PROJECT_ID}" --format 'value(status.url)')
          echo "Cloud Run URL: $URL"
          echo "CLOUD_RUN_URL=$URL" >> $GITHUB_ENV

