name: 🚀 Deploy Flask API to Cloud Run

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

# 연속 push 시 이전 실행 취소 → Cloud Build 분 낭비 방지
concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    env:
      SERVICE_NAME: wizcoco-api
      REGION: asia-northeast3
      AR_REPO: wizcoco-repo
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 🔧 Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: 🗄️ Ensure Artifact Registry repository exists (Seoul)
        run: |
          if [ -z "${PROJECT_ID}" ]; then
            echo "❌ GCP_PROJECT_ID secret가 설정되어 있지 않습니다."
            exit 1
          fi
          if gcloud artifacts repositories describe "${AR_REPO}" \
            --location="${REGION}" \
            --project="${PROJECT_ID}" \
            --format="value(name)" >/dev/null 2>&1; then
            echo "✅ Artifact Registry 저장소 이미 존재: ${AR_REPO} (${REGION})"
          else
            echo "ℹ️ Artifact Registry 저장소가 없어 생성 시도: ${AR_REPO} (${REGION})"
            if ! gcloud artifacts repositories create "${AR_REPO}" \
              --repository-format=docker \
              --location="${REGION}" \
              --project="${PROJECT_ID}" \
              --description="WizCoCo API container images (Seoul)"; then
              echo "❌ 저장소 생성 실패: 권한 또는 프로젝트 설정을 확인하세요."
              echo "   필요한 권한 예시: roles/artifactregistry.admin"
              echo "   수동 생성 예시: gcloud artifacts repositories create ${AR_REPO} --repository-format=docker --location=${REGION} --project=${PROJECT_ID}"
              exit 1
            fi
            echo "✅ Artifact Registry 저장소 생성 완료: ${AR_REPO} (${REGION})"
          fi

      - name: 🐳 Build and push image (Asia-Northeast3)
        run: |
          if [ -z "${PROJECT_ID}" ]; then
            echo "❌ GCP_PROJECT_ID secret가 설정되어 있지 않습니다."
            exit 1
          fi
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${SERVICE_NAME}:${GITHUB_SHA}"
          gcloud builds submit ./backend \
            --project "${PROJECT_ID}" \
            --config=backend/cloudbuild.yaml \
            --substitutions=_IMAGE_TAG="${GITHUB_SHA}",_SERVICE_NAME="${SERVICE_NAME}",_REGION="${REGION}",_AR_REPO="${AR_REPO}"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      # PERMISSION_DENIED: artifactregistry.repositories.downloadArtifacts → 서비스 계정에 roles/artifactregistry.reader 부여 (backend/README.md 참고)
      - name: 🚀 Deploy to Cloud Run
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          COUNSELOR_ADMIN_NOTIFY_EMAIL: ${{ secrets.COUNSELOR_ADMIN_NOTIFY_EMAIL }}
        run: |
          if [ -z "${PROJECT_ID}" ]; then
            echo "❌ GCP_PROJECT_ID secret가 설정되어 있지 않습니다."
            exit 1
          fi

          ENV_VARS="FLASK_ENV=production"
          if [ -n "${SMTP_HOST}" ]; then ENV_VARS="${ENV_VARS},SMTP_HOST=${SMTP_HOST}"; fi
          if [ -n "${SMTP_PORT}" ]; then ENV_VARS="${ENV_VARS},SMTP_PORT=${SMTP_PORT}"; else ENV_VARS="${ENV_VARS},SMTP_PORT=587"; fi
          if [ -n "${SMTP_USER}" ]; then ENV_VARS="${ENV_VARS},SMTP_USER=${SMTP_USER}"; fi
          if [ -n "${SMTP_PASSWORD}" ]; then ENV_VARS="${ENV_VARS},SMTP_PASSWORD=${SMTP_PASSWORD}"; fi
          if [ -n "${MAIL_FROM}" ]; then ENV_VARS="${ENV_VARS},MAIL_FROM=${MAIL_FROM}"; fi
          if [ -n "${COUNSELOR_ADMIN_NOTIFY_EMAIL}" ]; then
            ENV_VARS="${ENV_VARS},COUNSELOR_ADMIN_NOTIFY_EMAIL=${COUNSELOR_ADMIN_NOTIFY_EMAIL}"
          else
            ENV_VARS="${ENV_VARS},COUNSELOR_ADMIN_NOTIFY_EMAIL=jomigata@gmail.com"
          fi
          if [ -n "${{ secrets.NOTIFICATION_CRON_SECRET }}" ]; then
            ENV_VARS="${ENV_VARS},NOTIFICATION_CRON_SECRET=${{ secrets.NOTIFICATION_CRON_SECRET }}"
          else
            echo "⚠️ NOTIFICATION_CRON_SECRET GitHub Secret 미설정 — Cron 워커(통지·cohort 리마인더)가 403으로 실패할 수 있습니다."
          fi
          ENV_VARS="${ENV_VARS},PUBLIC_SITE_URL=https://wizcoco.com"
          if [ -n "${{ secrets.SOLAPI_API_KEY }}" ]; then ENV_VARS="${ENV_VARS},SOLAPI_API_KEY=${{ secrets.SOLAPI_API_KEY }}"; fi
          if [ -n "${{ secrets.SOLAPI_API_SECRET }}" ]; then ENV_VARS="${ENV_VARS},SOLAPI_API_SECRET=${{ secrets.SOLAPI_API_SECRET }}"; fi
          if [ -n "${{ secrets.SOLAPI_SENDER }}" ]; then ENV_VARS="${ENV_VARS},SOLAPI_SENDER=${{ secrets.SOLAPI_SENDER }}"; fi
          if [ -n "${{ secrets.SOLAPI_KAKAO_PF_ID }}" ]; then ENV_VARS="${ENV_VARS},SOLAPI_KAKAO_PF_ID=${{ secrets.SOLAPI_KAKAO_PF_ID }}"; fi
          if [ -n "${{ secrets.SOLAPI_KAKAO_TEMPLATE_TEST_REMINDER }}" ]; then ENV_VARS="${ENV_VARS},SOLAPI_KAKAO_TEMPLATE_TEST_REMINDER=${{ secrets.SOLAPI_KAKAO_TEMPLATE_TEST_REMINDER }}"; fi
          if [ -n "${{ secrets.SOLAPI_KAKAO_TEMPLATE_CARE }}" ]; then ENV_VARS="${ENV_VARS},SOLAPI_KAKAO_TEMPLATE_CARE=${{ secrets.SOLAPI_KAKAO_TEMPLATE_CARE }}"; fi
          # CORS_ORIGINS는 쉼표가 gcloud --update-env-vars 구분자와 충돌 → backend/utils/cors_config.py 기본값 사용

          if [ -n "${SMTP_HOST}" ] && [ -n "${SMTP_USER}" ] && [ -n "${SMTP_PASSWORD}" ]; then
            echo "✅ SMTP 환경 변수가 Cloud Run에 주입됩니다 (상담사 승인 알림 메일 활성화)."
          else
            echo "⚠️ SMTP GitHub Secrets 미설정 — 메일 발송 없이 API만 배포됩니다."
            echo "   필요 Secrets: SMTP_HOST, SMTP_USER, SMTP_PASSWORD (선택: SMTP_PORT, MAIL_FROM, COUNSELOR_ADMIN_NOTIFY_EMAIL)"
          fi

          # 기존 Secret Manager 바인딩(SMTP_PASSWORD)이 있으면 env literal과 충돌 → 별도 update로 먼저 제거
          if [ -n "${SMTP_PASSWORD}" ]; then
            gcloud run services update "${{ env.SERVICE_NAME }}" \
              --region "${{ env.REGION }}" \
              --project "${PROJECT_ID}" \
              --remove-secrets=SMTP_PASSWORD \
              --quiet 2>/dev/null || echo "ℹ️ SMTP_PASSWORD secret 바인딩 없음 (건너뜀)"
          fi

          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image "$IMAGE" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 5000 \
            --min-instances=0 \
            --max-instances=3 \
            --memory=512Mi \
            --cpu=1 \
            --concurrency=80 \
            --cpu-throttling \
            --update-env-vars "${ENV_VARS}" \
            --project "${PROJECT_ID}" 2>&1 | tee /tmp/cloud-run-deploy.log

          DEPLOY_URL=$(grep -Eo 'https://[^ ]+run\.app' /tmp/cloud-run-deploy.log | tail -1 || true)
          if [ -n "${DEPLOY_URL}" ]; then
            echo "DEPLOY_SERVICE_URL=${DEPLOY_URL}" >> $GITHUB_ENV
            echo "✅ Deploy stdout URL: ${DEPLOY_URL}"
          fi

      - name: 🔗 Output service URL
        run: |
          if [ -z "${PROJECT_ID}" ]; then
            echo "❌ GCP_PROJECT_ID secret가 설정되어 있지 않습니다."
            exit 1
          fi
          URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" --region "${{ env.REGION }}" --project "${PROJECT_ID}" --format 'value(status.url)')
          if [ -n "${DEPLOY_SERVICE_URL:-}" ]; then
            URL="${DEPLOY_SERVICE_URL}"
            echo "ℹ️ health/sync에는 deploy stdout URL 사용"
          fi
          echo "Cloud Run URL: $URL"
          echo "CLOUD_RUN_URL=$URL" >> $GITHUB_ENV

          ok=0
          for i in 1 2 3 4 5 6; do
            if curl -sf "${URL}/api/health" | grep -q ok; then
              echo "✅ /api/health OK (attempt ${i})"
              ok=1
              break
            fi
            echo "⏳ /api/health 대기 중… (${i}/6)"
            sleep 10
          done
          if [ "${ok}" -ne 1 ]; then
            echo "⚠️ /api/health 확인 실패 — Cloud Run 로그 점검 필요"
            gcloud logging read \
              "resource.type=cloud_run_revision AND resource.labels.service_name=${{ env.SERVICE_NAME }}" \
              --project "${PROJECT_ID}" \
              --limit 20 \
              --format='value(textPayload)' 2>/dev/null || true
          fi

      - name: 🧹 Clean up old container images (keep latest 5)
        run: |
          if [ -z "${PROJECT_ID}" ]; then
            echo "⚠️ PROJECT_ID 없음, 이미지 정리 건너뜀"
            exit 0
          fi

          REPO="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${SERVICE_NAME}"

          echo "📋 현재 이미지 목록 조회: $REPO"
          # digest 기준으로 오래된 것부터 정렬, 최근 5개 제외하고 삭제
          DIGESTS=$(gcloud artifacts docker images list "$REPO" \
            --project "${PROJECT_ID}" \
            --sort-by="~UPDATE_TIME" \
            --format="get(digest)" \
            2>/dev/null | tail -n +6)

          if [ -z "$DIGESTS" ]; then
            echo "✅ 삭제할 이미지 없음 (5개 이하 보관 중)"
            exit 0
          fi

          echo "$DIGESTS" | while read -r DIGEST; do
            if [ -n "$DIGEST" ]; then
              echo "🗑️  삭제: ${REPO}@${DIGEST}"
              gcloud artifacts docker images delete "${REPO}@${DIGEST}" \
                --project "${PROJECT_ID}" \
                --delete-tags \
                --quiet || echo "⚠️ 삭제 실패 (권한 또는 이미 삭제됨): ${DIGEST}"
            fi
          done

          echo "✅ 이미지 정리 완료 (최근 5개 보존)"
