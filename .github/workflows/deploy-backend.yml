name: 🚀 Deploy Flask API to Cloud Run

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  SERVICE_NAME: wizcoco-api
  REGION: asia-northeast3

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          export_default_credentials: true

      - name: 🐳 Build and push image
        run: |
          IMAGE="gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          gcloud builds submit --tag "$IMAGE" ./backend
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: 🚀 Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image "$IMAGE" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 5000

      - name: 🔗 Output service URL
        run: |
          URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" --region "${{ env.REGION }}" --format 'value(status.url)')
          echo "Cloud Run URL: $URL"
          echo "CLOUD_RUN_URL=$URL" >> $GITHUB_ENV

