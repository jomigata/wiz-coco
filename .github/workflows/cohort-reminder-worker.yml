name: Cohort incomplete reminders

on:
  schedule:
    # 매일 09:00 KST (00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: {}

concurrency:
  group: cohort-reminder-worker
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Call cohort reminder API
        env:
          FLASK_URL: ${{ secrets.NEXT_PUBLIC_FLASK_API_URL }}
          CRON_SECRET: ${{ secrets.NOTIFICATION_CRON_SECRET }}
        run: |
          if [ -z "${FLASK_URL}" ]; then
            echo "NEXT_PUBLIC_FLASK_API_URL secret not set — skip"
            exit 0
          fi
          if [ -z "${CRON_SECRET}" ]; then
            echo "NOTIFICATION_CRON_SECRET not set — skip"
            exit 0
          fi
          HEALTH_URL="${FLASK_URL%/}/api/health"
          echo "GET ${HEALTH_URL}"
          if ! curl -sf "${HEALTH_URL}" | grep -q ok; then
            echo "API health check failed — deploy-backend 또는 Cloud Run 상태를 확인하세요"
            echo "docs/COHORT_REMINDER_CRON_SETUP_KO.md 참고"
            exit 1
          fi
          URL="${FLASK_URL%/}/api/notifications/cohort-reminders"
          echo "POST ${URL}"
          HTTP=$(curl -sS -o /tmp/cohort-reminder-out.json -w "%{http_code}" \
            -X POST "${URL}" \
            -H "Content-Type: application/json" \
            -H "X-Notification-Cron-Secret: ${CRON_SECRET}" \
            -d '{"limit":40}')
          cat /tmp/cohort-reminder-out.json
          echo ""
          if [ "${HTTP}" -lt 200 ] || [ "${HTTP}" -ge 300 ]; then
            echo "HTTP ${HTTP}"
            exit 1
          fi
          echo "cohort reminders processed"
